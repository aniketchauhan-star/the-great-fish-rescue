<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Great Fish Rescue</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,800;0,900;1,700&family=Fredoka+One&family=Lobster&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Responsive scaling ──
         Scale lives on inner viewport so turn.js drag math stays correct.
         Outer .book-scene only does translation. */
      .book-scene{
        transform: translate(-50%, -54%);
      }
      .book-scene .flipbook-viewport{
        transform: scale(var(--book-scale, 1));
        transform-origin: center center;
      }

      /* ── Preloader ──
         Shows the ACTUAL thumbnail (sized/positioned to match the real book)
         with a loading bar over it, so the loading happens "on the thumbnail
         page" itself. When loading finishes, the preloader fades out to reveal
         the live book — an identical thumbnail — and the image Start button
         then appears on it. No separate start screen. */
      #preloader {
        position:fixed;inset:0;z-index:99999;
        background:var(--theme-bg);
        font-family:'Fredoka One','Nunito',sans-serif;
        transition:opacity .5s ease;
      }
      #preloader.hide { opacity:0; pointer-events:none; }

      /* Mirror the live book's geometry exactly (see .book-scene /
         .book-cover-wrap / .flipbook-viewport below) for a seamless handoff. */
      .loader-scene{
        position:absolute; top:53%; left:50%;
        transform: translate(-50%, -54%);
      }
      .loader-cover-wrap{
        position:relative;
        background:var(--theme-cover);
        padding:14px;
        border-radius:18px;
        filter:
          drop-shadow(0 20px 40px rgba(0,0,0,.38))
          drop-shadow(0 6px 14px rgba(0,0,0,.22));
      }
      .loader-viewport{
        width:820px; height:472px; overflow:hidden;
        transform: scale(var(--book-scale, 1));
        transform-origin:center center;
      }
      .loader-thumb{
        width:100%; height:100%;
        object-fit:fill; display:block;   /* matches the page's 820×472 background */
        -webkit-user-drag:none; user-select:none;
      }

      /* Loading bar floats near the bottom-centre, over the thumbnail. */
      .loader-overlay{
        position:absolute; left:50%; bottom:11%;
        transform:translateX(-50%);
        display:flex;flex-direction:column;align-items:center;
        z-index:2;
      }
      .loader-bar-wrap { width:min(60vw, 240px); height:9px; background:rgba(255,255,255,.40); border-radius:6px; overflow:hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.25); }
      .loader-bar { height:100%; width:0%; background:#ffffff; border-radius:6px; transition:width .3s ease; box-shadow: 0 0 8px rgba(255,255,255,.7); }

      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
      html,body{width:100%;height:100%;overflow:hidden;background:var(--theme-bg);font-family:'Nunito',sans-serif;}

      /* ── Theme tokens (set by JS via THEMES[ACTIVE_THEME]) ──
         Initial values MUST match THEMES[ACTIVE_THEME] (pawYellow) so there
         is no first-paint flash before applyTheme() runs. */
      :root{
        --theme-bg: #FFD93D;
        --theme-cover: #7B2630;
        --theme-cover-dark: #5C1B23;
        --theme-cover-light: #9C3641;
        --theme-accent: #7B2630;
        --theme-decor: rgba(243,180,42,.55);
      }
      html,body,#preloader{ background: var(--theme-bg); }

      /* ── Centered book scene ── */
      .book-scene{
        position:absolute;top:53%;left:50%;
        display:flex;flex-direction:column;align-items:center;
      }

      /* ── Hardcover wrap ──
         Now closed on all four sides since the page-stack base was removed.
         The cover provides the full border around the flipbook viewport. */
      .book-cover-wrap{
        position:relative;
        background:var(--theme-cover);
        padding:14px;
        border-radius:18px;
        filter:
          drop-shadow(0 20px 40px rgba(0,0,0,.38))
          drop-shadow(0 6px 14px rgba(0,0,0,.22));
      }
      .book-cover-wrap::before{
        content:'';position:absolute;inset:0;pointer-events:none;
        background:linear-gradient(to bottom,rgba(255,255,255,.07) 0%,transparent 35%,rgba(0,0,0,.06) 100%);
        border-radius:inherit;
      }

      /* ── Flipbook sizing (single-page landscape) ── */
      .flipbook-viewport{
        overflow:hidden;width:820px;height:472px;position:relative;
        touch-action:none;
        -webkit-user-select:none;user-select:none;
        will-change:transform;
        transform:translateZ(0);
      }
      .flipbook-viewport .container{position:absolute;top:50%;left:50%;}

      /* In-page videos and iframes cover the full page (including the right
         corner). Iframes swallow events cross-document and videos can hijack
         touch/drag — both block turn.js's corner peel on the right. Let
         pointer events pass through to the page so turn.js can pick up the
         drag from any point, including the bottom-right corner. */
      .flipbook-viewport .spread-video,
      .flipbook-viewport iframe.spread-html{
        pointer-events:none;
        backface-visibility:hidden;
        -webkit-backface-visibility:hidden;
        transform:translateZ(0);
        will-change:transform, opacity;
      }
      .flipbook-viewport .spread-video{
        z-index:60;
      }

      #flipbook{
        width:820px;height:472px;
        position:relative;
        left:-410px;top:-236px;
        transform:translateZ(0);
        will-change:transform;
      }

      /* turn.js page styles — single page is the full landscape size */
      .flipbook-viewport .page{
        width:820px;height:472px;
        background-color:#fff;
        background-repeat:no-repeat;background-size:100% 100%;
        border-radius:4px 10px 10px 4px;
        overflow:hidden;
        transform:translateZ(0);
        will-change:transform;
        backface-visibility:hidden;
        -webkit-backface-visibility:hidden;
      }
      /* Subtle paper curve — soft inset shadow along the outer (right) edge
         gives the illusion of a gentle page bow without distorting content. */
      .flipbook-viewport .page::before{
        content:"";
        position:absolute;inset:0;
        pointer-events:none;
        border-radius:inherit;
        box-shadow:
          inset -14px 0 22px -14px rgba(0,0,0,0.22),
          inset 6px 0 12px -8px rgba(0,0,0,0.10);
        z-index:50;
      }
      /* Make the back face of a turning page mirror the same artwork (no white/purple flash).
         turn.js renders the folded leaf inside .turn-page-wrapper and uses ::after as the back face.
         We apply the current page's artwork to that back face via a CSS variable set in JS. */
      .flipbook-viewport .page.fixed,
      .flipbook-viewport .turn-page-wrapper .page{
        background-color:#fff;
      }
      .flipbook-viewport .turn-page-wrapper{
        background-image: var(--back-face-image, none) !important;
        background-color: var(--back-face-color, #fff) !important;
        background-size: 100% 100% !important;
        background-repeat: no-repeat !important;
        background-position: 0 0 !important;
        border-radius:4px 10px 10px 4px;
        transform:translateZ(0);
        will-change:transform;
        backface-visibility:hidden;
        -webkit-backface-visibility:hidden;
      }
      .flipbook-viewport .turn-page-wrapper,
      .flipbook-viewport .turn-page-wrapper > div,
      .flipbook-viewport .page-wrapper{
        will-change:transform;
        backface-visibility:hidden;
        -webkit-backface-visibility:hidden;
      }
      .flipbook .page{box-shadow:0 2px 6px rgba(0,0,0,.12),0 0 22px rgba(0,0,0,.18)}
      .flipbook-viewport .shadow{transition:box-shadow .5s;box-shadow:0 0 20px #bbb}

      /* ── Binding overlay — sits on the LEFT edge of the book ── */
      .book-spine{
        position:absolute;
        top:0;
        left:0;
        width:18px;
        height:100%;
        z-index:9999;
        pointer-events:none;       /* don't intercept turn.js drag */
        cursor:pointer;            /* clickable to go back */
        background: linear-gradient(to right,
          rgba(0,0,0,0.35) 0%,
          rgba(0,0,0,0.22) 40%,
          rgba(0,0,0,0.10) 75%,
          rgba(0,0,0,0)    100%
        );
        box-shadow: 2px 0 6px -1px rgba(0,0,0,0.18) inset;
      }
      .book-spine::after{
        content:'';position:absolute;top:0;bottom:0;left:0;width:3px;
        background:linear-gradient(to bottom,var(--theme-cover-dark),var(--theme-cover),var(--theme-cover-dark));
        border-radius:0 2px 2px 0;
      }

      /* ── Custom page-navigation buttons ──
         Live INSIDE .flipbook-viewport so they overlay the book and stay
         fixed while pages turn. The viewport is scaled by --book-scale
         (0.28×–3.5×); we divide the size/offset by that scale so the buttons
         hold a constant ~100px on screen regardless of the book scale. */
      .nav-btn{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        width:calc(100px / var(--book-scale, 1));
        height:calc(100px / var(--book-scale, 1));
        padding:0;
        border:0;
        background:transparent;
        cursor:pointer;
        z-index:10000;            /* above spine (9999), videos (60), overlay (50) */
        -webkit-tap-highlight-color:transparent;
        -webkit-appearance:none;appearance:none;
        outline:none;
        transition:opacity .35s ease, transform .2s ease;
        /* Hidden by default — JS adds .nav-visible only when the current page
           is finished (video ended / image ready) and the page allows it. */
        opacity:0;
        visibility:hidden;
        pointer-events:none;
      }
      .nav-btn img{
        width:100%;height:100%;
        object-fit:contain;
        display:block;
        pointer-events:none;      /* clicks land on the button, not the image */
        -webkit-user-drag:none;user-select:none;
      }
      .nav-back{ left:calc(14px / var(--book-scale, 1)); }
      .nav-next{ right:calc(14px / var(--book-scale, 1)); }

      /* Visible + clickable state */
      .nav-btn.nav-visible{
        opacity:1;
        visibility:visible;
        pointer-events:auto;      /* only the buttons capture clicks */
      }
      .nav-btn.nav-visible:hover{  transform:translateY(-50%) scale(1.07); }
      .nav-btn.nav-visible:active{ transform:translateY(-50%) scale(.95); }

      /* Soft pulse + glow attract animation (added 3s after page is ready) */
      @keyframes navPulse{
        0%,100%{ transform:translateY(-50%) scale(1);
                 filter:drop-shadow(0 0 2px rgba(255,255,255,.35)); }
        50%    { transform:translateY(-50%) scale(1.09);
                 filter:drop-shadow(0 0 12px rgba(255,232,140,.95)); }
      }
      .nav-btn.nav-visible.nav-attract{ animation:navPulse 1.6s ease-in-out infinite; }

      /* Responsive: smaller buttons on small screens (still divided by scale
         so the on-screen size stays stable on phones/tablets) */
      @media (max-width: 640px){
        .nav-btn{
          width:calc(70px / var(--book-scale, 1));
          height:calc(70px / var(--book-scale, 1));
        }
        .nav-back{ left:calc(8px / var(--book-scale, 1)); }
        .nav-next{ right:calc(8px / var(--book-scale, 1)); }
      }

      /* ── Start button (cover/thumbnail page only) ──
         Sits between the title text and the beach at the bottom of the
         Thumbnail. The cover no longer auto-advances; the reader must click
         this to proceed to the first story page. Scaled with --book-scale so
         its on-screen size stays stable like the nav buttons. */
      .start-btn{
        position:absolute;
        left:50%;
        top:84%;
        transform:translate(-50%,-50%);
        width:calc(320px / var(--book-scale, 1));
        height:auto;
        padding:0;
        border:0;
        background:transparent;
        cursor:pointer;
        z-index:10001;            /* above nav buttons / spine */
        -webkit-tap-highlight-color:transparent;
        -webkit-appearance:none;appearance:none;
        outline:none;
        transition:opacity .35s ease, transform .2s ease;
        opacity:0;
        visibility:hidden;
        pointer-events:none;
      }
      /* Soft golden glow behind the button */
      .start-btn::before{
        content:"";
        position:absolute;
        left:50%;
        top:50%;
        width:150%;
        height:200%;
        transform:translate(-50%,-50%);
        background:radial-gradient(ellipse at center,
                    rgba(255,236,150,.95) 0%,
                    rgba(255,214,80,.55) 35%,
                    rgba(255,200,40,0) 70%);
        z-index:-1;
        pointer-events:none;
        animation:startGlow 1.8s ease-in-out infinite;
      }
      @keyframes startGlow{
        0%,100%{ opacity:.6; transform:translate(-50%,-50%) scale(.92); }
        50%    { opacity:1;  transform:translate(-50%,-50%) scale(1.08); }
      }
      .start-btn img{
        width:100%;height:auto;
        display:block;
        pointer-events:none;
        -webkit-user-drag:none;user-select:none;
        filter:drop-shadow(0 4px 10px rgba(0,0,0,.35));
      }
      .start-btn.start-visible{
        opacity:1;
        visibility:visible;
        pointer-events:auto;
        animation:startPulse 1.6s ease-in-out infinite;
      }
      .start-btn.start-visible:hover{  transform:translate(-50%,-50%) scale(1.07); animation:none; }
      .start-btn.start-visible:active{ transform:translate(-50%,-50%) scale(.95); animation:none; }
      @keyframes startPulse{
        0%,100%{ transform:translate(-50%,-50%) scale(1);
                 filter:drop-shadow(0 0 2px rgba(255,255,255,.4)); }
        50%    { transform:translate(-50%,-50%) scale(1.06);
                 filter:drop-shadow(0 0 14px rgba(255,232,140,.95)); }
      }
      @media (max-width: 640px){
        .start-btn{ width:calc(230px / var(--book-scale, 1)); }
      }

      /* ── Page turn hint — corner peel tease (inactivity-triggered) ── */
      .page-turn-hint {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 76px;
        height: 76px;
        z-index: 9998;
        pointer-events: none;
        transform: scale(0);
        transform-origin: 100% 100%;   /* anchored at bottom-right corner */
        background: linear-gradient(315deg,
          #f5f5ed 0%,
          #e8e8de 26%,
          rgba(0,0,0,0.14) 45%,
          transparent 54%);
        box-shadow: -4px -4px 12px rgba(0,0,0,0.22);
      }
      .page-turn-hint.active {
        animation: cornerTease 2.8s ease-in-out forwards;
      }
      @keyframes cornerTease {
        0%   { transform: scale(0);    opacity: 0; }
        18%  { transform: scale(1);    opacity: 1; }   /* fully peeled */
        40%  { transform: scale(0.28); opacity: 0.8; } /* settles back */
        62%  { transform: scale(0.85); opacity: 1; }   /* lifts again */
        82%  { transform: scale(0.22); opacity: 0.65; }/* settles */
        100% { transform: scale(0);    opacity: 0; }   /* flat */
      }

      /* ── Swipe-hand demo overlay (shown once on first visit) ── */
      .swipe-hand-demo {
        position: absolute;
        bottom: 28px;
        right: 28px;
        z-index: 10000;
        pointer-events: none;
        opacity: 0;
        width: 64px;
        height: 64px;
        filter: drop-shadow(0 4px 10px rgba(0,0,0,.45));
      }
      .swipe-hand-demo.run {
        animation: swipeHandArc 1.6s cubic-bezier(.4,0,.2,1) forwards;
      }
      @keyframes swipeHandArc {
        0%   { opacity:0;   transform: translate(0px, 0px)   scale(.85); }
        12%  { opacity:1;   transform: translate(0px, 0px)   scale(1);   }
        75%  { opacity:1;   transform: translate(-130px, -18px) scale(1); }
        100% { opacity:0;   transform: translate(-155px, -22px) scale(.9); }
      }

      /* Label bubble that appears above the corner on first visit */
      .swipe-hint-label {
        position: absolute;
        bottom: 78px;
        right: 14px;
        z-index: 10000;
        pointer-events: none;
        background: rgba(0,0,0,.68);
        color: #fff;
        font-family: 'Fredoka One','Nunito',sans-serif;
        font-size: 13px;
        letter-spacing: .3px;
        padding: 5px 10px 5px 9px;
        border-radius: 20px;
        white-space: nowrap;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity .35s ease, transform .35s ease;
      }
      .swipe-hint-label::after {
        content: '';
        position: absolute;
        bottom: -6px;
        right: 18px;
        width: 0; height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 7px solid rgba(0,0,0,.68);
      }
      .swipe-hint-label.show { opacity: 1; transform: translateY(0); }
      .page-turn-hint,
      .swipe-hand-demo,
      .swipe-hint-label{
        display:none !important;
      }

      /* ── Pond reveal interaction (state-based) ──
         The page background swaps between pre-rendered state images on each
         correct tap. .pond-state-fade sits above the page background and
         cross-fades to the next state image, after which we promote that
         image to the background and hide the overlay. Tap zones are
         invisible click targets sized over each pond. */
      .pond-state-fade{
        position:absolute;top:0;left:0;width:100%;height:100%;
        background-size:100% 100%;background-repeat:no-repeat;background-position:0 0;
        opacity:0;
        pointer-events:none;
        z-index:4;
        transition:opacity .35s ease;
        will-change:opacity;
      }
      .pond-tap-zone{
        position:absolute;
        cursor:pointer;
        z-index:6;
        background:transparent;
      }
      /* Instruction text shown on the pond page until the first tap. */
      .pond-instruction-text{
        position:absolute;
        top:4%;
        left:50%;
        transform:translateX(-50%);
        font-family:'Lollita','Lobster',cursive;
        font-size:46.63px;
        line-height:1;
        color:#fff;
        text-shadow:
          0 3px 10px rgba(0,0,0,.55),
          0 1px 2px rgba(0,0,0,.7),
          -1px -1px 0 rgba(0,0,0,.35);
        letter-spacing:.5px;
        pointer-events:none;
        z-index:7;
        white-space:nowrap;
        transition:opacity .4s ease, transform .4s ease;
        will-change:opacity,transform;
      }
      .pond-instruction-text.hidden{
        opacity:0;
        transform:translateX(-50%) translateY(-12px);
      }
      /* Animated tap-cursor pointing at the first (pink) pond. */
      .pond-hint-cursor{
        position:absolute;
        width:78px;height:78px;
        pointer-events:none;
        z-index:7;
        animation:hintTapBob 1.3s ease-in-out infinite;
        transition:
          opacity .35s ease,
          left .55s cubic-bezier(.4,0,.2,1),
          top  .55s cubic-bezier(.4,0,.2,1);
        filter:drop-shadow(0 4px 8px rgba(0,0,0,.42));
        will-change:transform,opacity,left,top;
      }
      .pond-hint-cursor.hidden{ opacity:0; transform:scale(.6); }
      @keyframes hintTapBob{
        0%,100% { transform:translate(0,0) scale(1); }
        45%     { transform:translate(0,-12px) scale(1.08); }
        65%     { transform:translate(0,2px) scale(.96); }
      }

      /* ── Slow pan-in zoom (e.g. scene 3) ──
         An <img> fills the page; the .playing class kicks off a Ken-Burns
         zoom toward the configured transform-origin. We toggle .playing in
         the turn.js turning/turned events so the animation restarts each
         time the user lands on the page. */
      .shape-hint-cursor{
        position:absolute;
        width:72px;height:72px;
        pointer-events:none;
        z-index:90;
        animation:hintTapBob 1.3s ease-in-out infinite;
        filter:drop-shadow(0 4px 8px rgba(0,0,0,.42));
        will-change:transform,left,top,opacity;
        transition:
          opacity .28s ease,
          transform .28s ease,
          left .4s cubic-bezier(.4,0,.2,1),
          top .4s cubic-bezier(.4,0,.2,1);
      }
      .shape-hint-cursor.hidden{
        opacity:0;
        transform:scale(.6);
      }
      .shape-sound-zone{
        position:absolute;
        z-index:85;
        padding:0;
        margin:0;
        outline:none;
        appearance:none;
        -webkit-appearance:none;
        cursor:pointer;
        border:3px dashed rgba(255,255,255,.95);
        border-radius:18px;
        background:rgba(255,255,255,.05);
        box-shadow:
          0 0 0 3px rgba(43,113,255,.14) inset,
          0 10px 24px rgba(0,0,0,.14);
        animation:shapeTapPulse 1.6s ease-in-out infinite;
        touch-action:manipulation;
      }
      .shape-sound-zone.is-circle{ border-radius:999px; }
      .shape-seq-zone{
        position:absolute;
        z-index:85;
        padding:0;
        margin:0;
        border:0;
        outline:none;
        appearance:none;
        -webkit-appearance:none;
        background:transparent;
        cursor:pointer;
        pointer-events:auto !important;
        touch-action:manipulation;
        -webkit-tap-highlight-color:transparent;
      }
      .shape-seq-zone.is-circle{ border-radius:999px; }
      .shape-seq-reveal{
        position:absolute;
        inset:0;
        z-index:40;
        opacity:0;
        pointer-events:none;
        transition:opacity .35s ease;
        overflow:hidden;
      }
      .shape-seq-reveal.show{
        opacity:1;
      }
      .shape-seq-reveal-media{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        display:none;
        background:transparent;
      }
      .shape-sound-zone.played{
        animation:none;
        transform:scale(.985);
        background:rgba(255,255,255,.14);
        box-shadow:
          0 0 0 4px rgba(255,214,10,.28) inset,
          0 12px 30px rgba(255,214,10,.22);
      }
      @keyframes shapeTapPulse{
        0%,100%{
          transform:scale(1);
          box-shadow:
            0 0 0 3px rgba(43,113,255,.14) inset,
            0 10px 24px rgba(0,0,0,.14);
        }
        50%{
          transform:scale(1.02);
          box-shadow:
            0 0 0 5px rgba(255,255,255,.18) inset,
            0 0 0 12px rgba(91,162,255,.10),
            0 12px 30px rgba(0,0,0,.18);
        }
      }

      /* ── "Tap the rectangle" interaction (after page 7) ──
         A clickable rectangle image bobs at its start position; on tap it
         slides into the black target slot and locks in place. */
      .drag-rect-target{
        position:absolute;
        background:#000;
        border-radius:6px;
        z-index:4;
        box-shadow:
          inset 0 0 0 2px rgba(255,255,255,.18),
          inset 0 4px 10px rgba(0,0,0,.55);
      }
      .drag-rect-piece{
        position:absolute;
        background-repeat:no-repeat;
        background-size:100% 100%;
        background-position:center;
        cursor:pointer;
        z-index:7;
        transition:
          left .6s cubic-bezier(.34,1.3,.45,1),
          top  .6s cubic-bezier(.34,1.3,.45,1),
          width .6s cubic-bezier(.34,1.3,.45,1),
          height .6s cubic-bezier(.34,1.3,.45,1),
          opacity .35s ease,
          filter .4s ease;
        filter:drop-shadow(0 8px 14px rgba(0,0,0,.35));
        animation:rectBob 1.25s ease-in-out infinite;
        will-change:transform,left,top,width,height;
        touch-action:manipulation;
      }
      /* Pre-click state: the rectangle sits invisibly over the black box
         as the click hotspot. No paint, no bob, no shadow — only the
         pointer cursor hints that the area is interactive. Remove cursor:
         pointer below if you want a fully hidden hotspot. */
      .drag-rect-piece.pre-placed{
        opacity:0;
        animation:none;
        filter:none;
        background-image:none !important;
      }
      .drag-rect-piece.placed{
        animation:none;
        cursor:default;
        z-index:5;
        filter:drop-shadow(0 3px 5px rgba(0,0,0,.25));
      }
      @keyframes rectBob{
        0%,100%{ transform: translateY(0) scale(1); }
        50%    { transform: translateY(-7px) scale(1.03); }
      }
      .drag-rect-instruction{
        position:absolute;
        top:5%;
        left:50%;
        transform:translateX(-50%);
        font-family:'Lobster','Fredoka One',cursive;
        font-size:40px;
        line-height:1;
        color:#fff;
        text-shadow:
          0 3px 10px rgba(0,0,0,.55),
          0 1px 2px rgba(0,0,0,.75),
          -1px -1px 0 rgba(0,0,0,.35);
        letter-spacing:.5px;
        pointer-events:none;
        z-index:8;
        white-space:nowrap;
        transition:opacity .4s ease, transform .4s ease;
        will-change:opacity,transform;
      }
      .drag-rect-instruction.hidden{
        opacity:0;
        transform:translateX(-50%) translateY(-12px);
      }
      .drag-rect-hint{
        position:absolute;
        width:62px;height:62px;
        right:-18px; bottom:-22px;
        pointer-events:none;
        z-index:9;
        animation:hintTapBob 1.3s ease-in-out infinite;
        filter:drop-shadow(0 4px 8px rgba(0,0,0,.42));
        will-change:transform;
      }
      .drag-rect-piece.placed .drag-rect-hint{
        opacity:0;
        transition:opacity .35s ease;
      }
      .drag-rect-done{
        position:absolute;
        bottom:6%;
        left:50%;
        transform:translateX(-50%) translateY(10px);
        font-family:'Fredoka One','Nunito',sans-serif;
        font-size:20px;
        color:#fff;
        background: rgba(0,0,0,.6);
        padding: 8px 18px;
        border-radius: 22px;
        pointer-events:none;
        opacity:0;
        z-index:8;
        white-space:nowrap;
        transition:opacity .45s ease, transform .45s ease;
        box-shadow:0 6px 18px rgba(0,0,0,.32);
      }
      .drag-rect-done.show{ opacity:1; transform:translateX(-50%) translateY(0); }

      /* ── Page 7(1) interaction ──
         Scoped under .page-7-1 so nothing here can affect other pages.
           • .rect-hotspot — invisible clickable rectangle on top of the
             painted black box. Receives the tap.
           • .rect-fill    — pink Rectangle.png that lives inside the box,
             starts opacity:0 and fades in on .show.
           • .hand-nudge   — bobbing hand SVG that points at the box and
             fades out (.hidden) once the box has been tapped. */
      .page-7-1 .rect-hotspot{
        position:absolute;
        display:block;
        cursor:pointer;
        z-index:80;
        background:transparent;
        border:0;
        outline:none;
        padding:0;
        margin:0;
        appearance:none;
        -webkit-appearance:none;
        pointer-events:auto !important;
        touch-action:manipulation;
        -webkit-tap-highlight-color:transparent;
      }
      .page-7-1 .rect-hotspot.done{
        pointer-events:none;
      }
      .page-7-1 .rect-fill{
        position:absolute;
        background-repeat:no-repeat;
        background-size:100% 100%;
        background-position:center;
        z-index:5;
        opacity:0;
        transform:scale(.85);
        transition:opacity .35s ease, transform .35s cubic-bezier(.34,1.3,.45,1);
        filter:drop-shadow(0 4px 8px rgba(0,0,0,.30));
        pointer-events:none;
      }
      .page-7-1 .rect-fill.show{
        opacity:1;
        transform:scale(1);
      }
      .page-7-1 .hand-nudge{
        position:absolute;
        left:20% !important;
        top:19% !important;
        width:64px; height:64px;
        pointer-events:none !important;
        z-index:82;
        filter:drop-shadow(0 4px 8px rgba(0,0,0,.42));
        animation:handNudgeBob 1.25s ease-in-out infinite;
        transition:opacity .35s ease, transform .35s ease;
        will-change:transform,opacity;
      }
      /* When the nudge sits ABOVE the box, the finger needs to point
         DOWN. The inner div is rotated 180° so the SVG flips, and the
         bob is inverted so the hand taps toward the box at peak. */
      .page-7-1 .hand-nudge.points-down{
        animation:handNudgeBobDown 1.25s ease-in-out infinite;
      }
      .page-7-1 .hand-nudge .hand-nudge-inner{
        width:100%; height:100%;
        display:block;
      }
      .page-7-1 .hand-nudge.points-down .hand-nudge-inner{
        transform:rotate(180deg);
      }
      .page-7-1 .hand-nudge.hidden{
        display:none !important;
        visibility:hidden !important;
        opacity:0 !important;
      }
      @keyframes handNudgeBob{
        0%,100%{ transform: translate(0,0) scale(1); }
        50%    { transform: translate(0,-9px) scale(1.06); }
      }
      @keyframes handNudgeBobDown{
        0%,100%{ transform: translate(0,0) scale(1); }
        50%    { transform: translate(0,9px) scale(1.06); }
      }
      /* Next-page video that plays inline on 7(1) after the tap. Sits
         on top of the page art (z-index above the fill / hotspot / hand)
         and is invisible until the .show class is added. */
      .page-7-1 .next-page-video{
        position:absolute;
        top:0; left:0;
        width:100%; height:100%;
        object-fit:cover;
        background:#000;
        z-index:10;
        opacity:0;
        pointer-events:none;
        transition:opacity .35s ease;
      }
      .page-7-1 .next-page-video.show{
        opacity:1;
      }
      /* Page 8(1) pink rectangle reveal interaction */
      .page-8-1 .p81-base-layer{
        position:absolute;
        top:0; left:0;
        width:100%; height:100%;
        object-fit:cover;
        z-index:1;
        pointer-events:none;
      }
      .page-8-1 #video-9-overlay{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:9999;
        display:none;
        visibility:hidden;
        opacity:0;
        pointer-events:none;
        object-fit:cover;
        background:#000;
      }
      .page-8-1 #video-9-overlay.show{
        display:block;
        visibility:visible;
        opacity:1;
      }
      .page-8-1 .p81-hotspot{
        position:absolute;
        display:block;
        cursor:pointer;
        z-index:80;
        background:transparent;
        border:0;
        outline:none;
        padding:0;
        margin:0;
        appearance:none;
        -webkit-appearance:none;
        pointer-events:auto !important;
        touch-action:manipulation;
        -webkit-tap-highlight-color:transparent;
      }
      .page-8-1 .p81-hotspot.done{
        pointer-events:none;
      }
      .page-8-1 .hand-nudge{
        position:absolute;
        width:64px; height:64px;
        pointer-events:none !important;
        z-index:82;
        filter:drop-shadow(0 4px 8px rgba(0,0,0,.42));
        animation:handNudgeBob 1.25s ease-in-out infinite;
        transition:opacity .35s ease, transform .35s ease;
        will-change:transform,opacity;
      }
      .page-8-1 .hand-nudge.hidden{
        display:none !important;
        visibility:hidden !important;
        opacity:0 !important;
      }
      .page-8-1 .hand-nudge .hand-nudge-inner{
        width:100%; height:100%;
        display:block;
      }
      .pan-zoom-img{
        position:absolute;top:0;left:0;
        width:100%;height:100%;
        object-fit:cover;
        display:block;
        transform:translateZ(0) scale(1);
        transform-origin:50% 38%;
        will-change:transform;
        backface-visibility:hidden;
        -webkit-backface-visibility:hidden;
      }
      .pan-zoom-img.playing{
        animation: panZoomIn var(--pan-duration, 5.5s) ease-in-out forwards;
      }
      @keyframes panZoomIn{
        from { transform:translateZ(0) scale(1); }
        to   { transform:translateZ(0) scale(var(--pan-end-scale, 1.4)); }
      }


      /* ── Page stack below cover (horizontal lines = pages) ── */
      .page-stack{
        width:848px;
        margin-top:0;
        position:relative;
        display:flex;
        flex-direction:column;
        align-items:center;
      }
      .page-stack::before,
      .page-stack::after{
        content:'';
        position:absolute;
        top:-1px;
        bottom:0;
        width:14px;
        background:var(--theme-cover);
        z-index:0;
      }
      .page-stack::before{left:0;}
      .page-stack::after{right:0;}
      .page-stack-inner{
        width:820px;
        height:24px;
        background-image:repeating-linear-gradient(
          to bottom,
          #f0f0f8 0px,#f0f0f8 3.5px,
          #d8d8e8 3.5px,#d8d8e8 6px
        );
        border-radius:0 0 10px 10px;
        position:relative;
        z-index:1;
        overflow:hidden;
      }
      .page-stack-inner::before{
        content:'';display:block;height:100%;
        background:linear-gradient(to right,rgba(150,150,185,.45) 0%,transparent 7%,transparent 93%,rgba(150,150,185,.45) 100%);
        border-radius:inherit;
      }
      /* Purple hardcover strip below page lines — extends to sides and connects upward */
      .page-stack-purple{
        width:848px;
        height:10px;
        background:var(--theme-cover);
        border-radius:0 0 18px 18px;
        box-shadow:0 8px 22px rgba(0,0,0,.22),0 3px 6px rgba(0,0,0,.1);
        position:relative;
        z-index:1;
      }

      /* ── Spine tab ── */
      .spine-tab{
        width:60px;height:22px;
        background:linear-gradient(to bottom,var(--theme-cover),var(--theme-cover-dark));
        border-radius:0 0 30px 30px;
        box-shadow:0 6px 14px rgba(0,0,0,.26);
        position:absolute;
        left:18px;             /* flush against left edge — represents binding */
        top:100%;              /* sits immediately below the page-stack with no gap */
        margin-top:-1px;
        z-index:2;
      }

      /* ── Page counter ── */
      .pg-cnt{
        margin-top:10px;font-size:28px;font-weight:900;
        color:var(--theme-accent);letter-spacing:.5px;
        font-family:'Fredoka One','Nunito',sans-serif;
      }

      /* ── Text/dialogue overlay — sits OVER the flipbook, not inside pages ──
         Avoids overflow:hidden clipping from turn.js page-wrappers
      ── */

      /* Narrator text bar */
      /* (unified into the second .text-bar rule below) */

      /* Character dialogue bubbles */

      /* Dummy pages hidden */
      .dummy-page{visibility:hidden;}
      .cover-title-wrap{
        position:absolute;top:20px;left:16px;right:16px;
        background:rgba(50,0,110,.5);
        border-radius:10px;padding:10px 16px;
        text-align:center;z-index:3;
        box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.1),0 4px 12px rgba(0,0,0,.25);
      }
      .cover-title-text{
        font-family:'Fredoka One','Nunito',sans-serif;
        font-size:22px;font-weight:400;color:white;line-height:1.25;
        text-shadow:0 2px 8px rgba(0,0,0,.4);
      }
      .cover-stars{
        position:absolute;bottom:22px;left:0;right:0;
        text-align:center;font-size:18px;letter-spacing:6px;color:rgba(255,255,255,.75);
        text-shadow:0 1px 4px rgba(0,0,0,.3);
      }
      .cover-hint{
        position:absolute;bottom:6px;left:0;right:0;
        text-align:center;font-size:11px;color:rgba(255,255,255,.42);
        font-weight:700;letter-spacing:.3px;
      }

      /* Word animation */


      /* Dummy pages — completely invisible, just fix turn.js pairing */
      .dummy-page{ background:transparent !important; box-shadow:none !important; visibility:hidden; }
      .gradient{
        position:absolute;inset:0;pointer-events:none;z-index:100;
      }

      /* ── Story overlay — sits OVER the flipbook, no turn.js clipping ── */
      #storyOverlay {
        position:absolute;
        bottom:0; left:0; right:0;
        z-index:50;
        pointer-events:none;
        /* Center everything to the book spread */
        display:flex;
        flex-direction:column;
        align-items:center;
      }
      /* Force every overlay child to ignore pointer events so drag/click reach turn.js */
      #storyOverlay,
      #storyOverlay * {
        pointer-events:none !important;
      }
      /* Text bar: spans full width, gradient from transparent to blue */
      #storyOverlay .text-bar {
        width:100%;
        height:0;
        overflow:hidden;
        padding:0 60px;
        background:linear-gradient(to bottom,
          rgba(30,58,175,0)    0%,
          rgba(30,58,175,.62)  28%,
          rgba(28,54,168,.96)  52%,
          rgba(26,50,158,1)    100%
        );
        display:flex; align-items:center; justify-content:center;
        transition:height .35s ease, padding .35s ease;
      }
      #storyOverlay .text-bar.active {
        height:145px;
        padding:40px 60px 16px;
      }
      .story-text {
        color:white;
        font-family:'Fredoka One','Nunito',sans-serif;
        font-size:23px; line-height:1.45; text-align:center;
        text-shadow:0 1px 8px rgba(0,0,0,.4);
        max-width:680px;
      }

      /* Word animation */
      .w { display:inline; opacity:0; transition:opacity .08s ease; }
      .w.on { opacity:1; }
      .w::after { content:' '; }

      /* Dialogue bubbles — centered to book, left-aligned text */
      #storyOverlay .dial-layer {
        display:flex; flex-direction:column; gap:5px;
        padding:0 0 16px 0;
        width:560px;          /* fixed width so bubbles stay centered to book */
        align-items:flex-start;
      }
      .dbubble {
        display:inline-flex; align-items:center; gap:9px;
        /* Less pale — stronger white with more visible shadow */
        background:rgba(255,255,255,.93);
        backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
        border-radius:10px;
        /* Tighter padding — less chunky */
        padding:5px 12px 5px 6px;
        box-shadow:0 4px 16px rgba(0,0,0,.22),0 1px 4px rgba(0,0,0,.12);
        opacity:0; transform:translateY(6px);
        transition:opacity .22s ease,transform .22s ease;
        align-self:flex-start;
      }
      .dbubble.show { opacity:1; transform:translateY(0); }
      .dbubble.dim  { opacity:.38; transform:translateY(0); }
      /* Smaller rectangular avatar */
      .bav {
        width:36px; height:32px; border-radius:7px; flex-shrink:0; overflow:hidden;
        border:1.5px solid rgba(0,0,0,.1); box-shadow:0 1px 4px rgba(0,0,0,.15);
        display:flex; align-items:center; justify-content:center;
        font-size:18px; background:rgba(240,248,255,.8);
      }
      .bav img { width:100%; height:100%; object-fit:cover; border-radius:5px; }
      .bt { font-size:14px; font-weight:700; color:#111827; line-height:1.35; text-align:left; }


      /* ── Count page ── */
      .count-page-overlay {
        position:absolute; inset:0; z-index:60;
        display:flex; align-items:center; justify-content:center;
        pointer-events:none;
      }
      .count-text {
        font-family:'Fredoka One','Nunito',sans-serif;
        font-size:38px; color:#FFFFFF; text-align:center;
        text-shadow:0 2px 8px rgba(0,0,0,.3);
        opacity:0; transform:scale(0.7);
        animation:countPop .6s ease forwards;
      }
      @keyframes countPop {
        0%{ opacity:0; transform:scale(0.7); }
        60%{ opacity:1; transform:scale(1.1); }
        100%{ opacity:1; transform:scale(1); }
      }
      /* Star confetti from corners */
      .confetti-container {
        position:fixed; inset:0;
        z-index:99998; pointer-events:none;
        overflow:hidden;
      }
      .confetti-star {
        position:absolute;
        width:var(--cs-size,24px); height:var(--cs-size,24px);
        will-change: transform, opacity;
        animation: confettiFly var(--cs-dur,3.5s) cubic-bezier(.18,.7,.4,1) forwards;
        animation-delay: var(--cs-delay,0s);
        opacity:0;
        filter: drop-shadow(0 2px 4px rgba(120,80,0,.35));
      }
      @keyframes confettiFly {
        0%   { opacity:0; transform: translate(0,0) rotate(0deg) scale(.6); }
        8%   { opacity:1; }
        60%  { opacity:1; }
        100% { opacity:0; transform: translate(var(--cs-tx),var(--cs-ty)) rotate(var(--cs-rot,540deg)) scale(1); }
      }
      /* Star burst (legacy, kept for any other uses) */
      .star-particle {
        position:fixed; pointer-events:none; z-index:99999;
        width:var(--star-size,24px); height:var(--star-size,24px);
        animation:starBurst var(--star-dur) ease-out forwards;
      }
      @keyframes starBurst {
        0%{ opacity:1; transform:translate(0,0) scale(1) rotate(0deg); }
        100%{ opacity:0; transform:translate(var(--sx),var(--sy)) scale(0.3) rotate(360deg); }
      }

    <!-- Preloader — the thumbnail itself, with a loading bar over it -->
    <div id="preloader">

            <img class="loader-thumb" src="../the%20great%20fish%20rescue/Thumbnail.png" alt="The Great Fish Rescue">

      </div>
      <div class="loader-overlay">
        <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
      </div>
    </div>

    <!-- Themed background decorations (filled by applyTheme) -->
    <svg
      id="themeDecor"
      style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0"
      viewBox="0 0 1000 600"

    ></svg>

    <audio id="bgMusic" loop preload="auto"></audio>

    <div class="book-scene">

      /* ── Responsive book scaling ──
         Book intrinsic size ≈ 848 wide × ~520 tall (cover + page-stack).
         Scale up on big screens, down on small ones, with sensible padding. */
      function updateBookScale(){
        var BOOK_W = 870;   /* a bit beyond 848 to include shadows */
        var BOOK_H = 510;   /* cover-wrap height (472 page + 14×2 padding + a touch for shadows) */
        /* Tighter padding so the book fills more of the viewport on every
           device. On a phone in portrait we still need a few pixels of
           breathing room for the page-counter under the book. */
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var pad = (Math.min(vw, vh) < 600) ? 12 : 24;
        var sx = (vw - pad) / BOOK_W;
        var sy = (vh - pad) / BOOK_H;
        var scale = Math.min(sx, sy);
        /* Cap is now 3.5× so the book grows naturally on 1080p / 1440p /
           4K monitors instead of stopping at 1.45× like before.
           Floor at 0.28 keeps it usable on tiny phones in portrait. */
        scale = Math.max(0.28, Math.min(scale, 3.5));

        var pages = mediaFiles.map(function(file){

      function setVideoMutedState(video, shouldMute){

      function clearVideoEndedState(video){

             Never leave videos at their last frame — that combined with

      function setupAllVideoEndHandlers(root){
        var videos;
        if(root && root.tagName && root.tagName.toLowerCase() === 'video'){

          videos = scope.querySelectorAll('video');

        Array.prototype.forEach.call(videos, function(video){
          if(!video || video.dataset.endHandlerReady === 'true') return;
          video.dataset.endHandlerReady = 'true';
          video.loop = false;
          video.autoplay = false;
          video.removeAttribute('loop');
          video.removeAttribute('autoplay');
          video.addEventListener('ended', function(){
            this.pause();
            this.loop = false;
            setVideoMutedState(this, true);

      /* Center a hand-nudge SVG on a target element's bounding box.
         opts.fracX / opts.fracY (default 0.5) pick a sub-region center —
         e.g. fracX=0.166 targets the left third of a strip that contains 3
         equal-width shapes. The hand keeps its CSS bob animation because we
         only set left/top (no inline transform). */
      function positionNudgeOnTarget(nudge, target, opts){
        if(!nudge || !target) return;
        opts = opts || {};
        var fracX = (opts.fracX !== undefined) ? opts.fracX : 0.5;
        var fracY = (opts.fracY !== undefined) ? opts.fracY : 0.5;
        var page = nudge.closest('.page') || nudge.parentElement;
        if(!page) return;
        var pageRect   = page.getBoundingClientRect();
        var targetRect = target.getBoundingClientRect();
        if(!pageRect.width || !targetRect.width) return;
        var centerX = (targetRect.left - pageRect.left) + targetRect.width  * fracX;
        var centerY = (targetRect.top  - pageRect.top ) + targetRect.height * fracY;
        var nudgeW = nudge.offsetWidth  || 64;
        var nudgeH = nudge.offsetHeight || 64;
        nudge.style.left = (centerX - nudgeW / 2) + 'px';
        nudge.style.top  = (centerY - nudgeH / 2) + 'px';

         by shapeSequence / pondStates). Uses translate(-50%, -50%) so
         left/top refer to the center rather than the top-left, which is
         what we want for "the hand sits on the shape". */
      function placeNudgeAtZone($nudge, zone, options){
        if(!$nudge || !zone) return;
        options = options || {};
        var offsetX = options.offsetX || 0;
        var offsetY = options.offsetY || 0;
        var leftNum   = parseFloat(zone.x !== undefined ? zone.x : zone.left);
        var topNum    = parseFloat(zone.y !== undefined ? zone.y : zone.top);
        var widthNum  = parseFloat(zone.w !== undefined ? zone.w : zone.width);
        var heightNum = parseFloat(zone.h !== undefined ? zone.h : zone.height);
        if(isNaN(leftNum) || isNaN(topNum) || isNaN(widthNum) || isNaN(heightNum)) return;
        var centerLeft = leftNum + widthNum  / 2 + offsetX;
        var centerTop  = topNum  + heightNum / 2 + offsetY;

          left: centerLeft + '%',
          top: centerTop + '%',
          transform: 'translate(-50%, -50%)',
          zIndex: 90,
          pointerEvents: 'none'
        });

      function bindFlipbookDelegatedInteractions(){

      function playVideosOnActivePage(pageElement) {
        if (!pageElement) return;

        pageElement.querySelectorAll('video').forEach(function(video){
          video.loop = false;
          video.removeAttribute('loop');

          if(video.dataset.manualPlay === 'true' || video.classList.contains('next-page-video') || video.classList.contains('p81-reveal-video')){

          clearVideoEndedState(video);
          try{ video.currentTime = 0; }catch(e){}

          video.style.visibility = '';
          video.style.opacity = '';

          if(wantSound){

            var t = setTimeout(function(){ if(seqActive) $(el).addClass('on'); }, i * gap);
            wTimers.push(t);
          });
        };
        if(src){
          var a = new Audio(src); actAudio = a; a.volume = 1;
          a.addEventListener('loadedmetadata', function(){ doW(a.duration * 1000); });
          a.addEventListener('error', function(){ doW(); });
          a.addEventListener('ended', cb);
          a.play().catch(function(){ doW(); var t = setTimeout(cb, ws.length*220+300); wTimers.push(t); });
        } else {
          var dur = Math.max(ws.length * 210, 800); doW(dur);
          var t = setTimeout(cb, dur + 240); wTimers.push(t);
        }

      function playPageTurnSound(direction){
        try{
          var key = direction === 'back' ? '__pageTurnSound_back' : '__pageTurnSound_forward';
          if(window[key]){
            var s = window[key].cloneNode(true);
            s.volume = 1.0;
            var pp = s.play();
            if(pp && pp.catch) pp.catch(function(){
              try{ window[key].currentTime = 0; window[key].volume = 1.0; window[key].play(); }catch(e){}
            });
            return;
          }
          /* Synth fallback: short paper-swish using WebAudio noise burst */
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if(!Ctx) return;
          var ctx = window.__pageTurnCtx || (window.__pageTurnCtx = new Ctx());
          var dur = 0.35;
          var buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
          var data = buf.getChannelData(0);
          for(var i=0;i<data.length;i++){
            var t = i/data.length;
            data[i] = (Math.random()*2-1) * Math.pow(1-t, 2.2) * 0.5;
          }
          var src = ctx.createBufferSource(); src.buffer = buf;
          var bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=0.8;
          var gain = ctx.createGain(); gain.gain.value = 0.6;
          src.connect(bp).connect(gain).connect(ctx.destination);
          src.start();
        }catch(e){}

      function fireBalloons(){
        /* Golden star confetti shooting from bottom-left and bottom-right corners */
        $('.confetti-container').remove();
        $('.balloon-container').remove();
        /* Play confetti pop sound */
        try{
          var pop = registerPageAudio(new Audio('confetti-pop.mp3'));
          pop.volume = 0.9;
          pop.play().catch(function(){});
        }catch(e){}
        var $c = $('<div class="confetti-container"></div>');
        document.body.appendChild($c[0]);

        var vw = window.innerWidth;
        var vh = window.innerHeight;

        function shoot(side, count, baseDelay){
          for(var i = 0; i < count; i++){
            var el = document.createElement('div');
            el.className = 'confetti-star';
            el.innerHTML = makeGoldStarSVG();

            /* Origin: bottom-left or bottom-right corner */
            var originX = side === 'left' ? -10 : vw + 10;
            var originY = vh + 10;
            el.style.left = originX + 'px';
            el.style.top  = originY + 'px';

            /* Varied star sizes */
            var size = 14 + Math.random() * 42; /* 14–56px */
            el.style.setProperty('--cs-size', size + 'px');

            /* Aim toward upper-opposite area, fanning out */
            /* Left cannon: aim up-right (angles ~ -75° to -25° from +x axis)
               Right cannon: aim up-left (~180+25° to 180+75°) */
            var angle;
            if(side === 'left'){
              angle = (-75 + Math.random() * 50) * Math.PI / 180;
            } else {
              angle = (180 + 25 + Math.random() * 50) * Math.PI / 180;
            }
            var dist = vw * (0.55 + Math.random() * 0.55); /* travel far across viewport */
            var tx = Math.cos(angle) * dist;
            var ty = Math.sin(angle) * dist - Math.random() * vh * 0.25; /* extra lift */
            el.style.setProperty('--cs-tx', tx + 'px');
            el.style.setProperty('--cs-ty', ty + 'px');

            /* Rotation & timing */
            var rot = (Math.random() * 720 + 360) * (Math.random() < 0.5 ? -1 : 1);
            el.style.setProperty('--cs-rot', rot + 'deg');
            el.style.setProperty('--cs-dur', (2.6 + Math.random() * 1.8) + 's');
            el.style.setProperty('--cs-delay', (baseDelay + Math.random() * 0.6) + 's');

            $c[0].appendChild(el);
          }
        }

        /* Two bursts per side for a fuller effect */
        shoot('left',  28, 0);
        shoot('right', 28, 0);
        shoot('left',  18, 0.8);
        shoot('right', 18, 0.8);

        /* Cleanup */
        setTimeout(function(){ $c.remove(); }, 7000);
      }

          duration:  760,

          /* cornerSize 0 disables native corner-peel/click/drag flipping so
             pages turn ONLY via the custom Back/Next buttons. Programmatic
             turn('next'/'previous'/'page') is unaffected by this. */
          cornerSize: 0,

              turning: function(e, page, view){

                if(!flipAllowed){ e.preventDefault(); return; }

                var goingForward = page > curP;
                playPageTurnSound(goingForward ? 'forward' : 'back');

                try{

                    fbEl.style.setProperty('--back-face-color', bgCol || '#fff');

        (function setupNavButtons(){

            var showNext = page >= FIRST_STORY_PAGE && page < TOTAL;

               auto-advance. The reader must click the Start button to begin.
               For a video cover the Start button appears once the intro video
               finishes; for a static cover it appears after a short settle. */
            if(page < FIRST_STORY_PAGE){
              if(video && video.dataset.hasEnded !== 'true'){

                var revealStart = function(){ detachCoverWatch(); showStartButton(); };

            if(!navBackBtn.classList.contains('nav-visible')) return;

            $cornerHint.removeClass('active');
            _hintPlaying = false;
            _scheduleHint();
          }, HINT_DUR);
        }

        function _scheduleHint(){
          clearTimeout(_hintTimer);
          _hintTimer = setTimeout(_playHint, HINT_DELAY);
        }

        function _cancelHint(){
          clearTimeout(_hintTimer);
          $cornerHint.removeClass('active');
          _hintPlaying = false;
          _scheduleHint(); /* restart the 3 s clock */
        }

        _scheduleHint();
        $(document).on('mousemove.hint touchstart.hint mousedown.hint', _cancelHint);
        $('#flipbook').bind('turning', _cancelHint);

        /* Swipe-hand demo — plays 3 loops on first visit, never again */
        var HINT_KEY = 'ebk_swipe_seen';
        if(!localStorage.getItem(HINT_KEY)){
          /* Hand SVG (Material "swipe" icon, white fill + dark outline) */
          var handSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">'
            + '<path fill="rgba(0,0,0,.55)" d="M11 5.5C11 4.12 12.12 3 13.5 3S16 4.12 16 5.5V11c.55-.34 1.2-.5 1.88-.5 1.27 0 2.39.75 2.91 1.88.44-.19.91-.28 1.38-.28C23.27 12.1 24 13.38 24 14.81V17c0 3.31-2.69 6-6 6h-4.27C11.34 23 9 20.66 9 17.78V12c0-1.38 1.12-2.5 2.5-2.5.18 0 .35.02.5.05V5.5z"/>'
            + '<path fill="#ffffff" d="M11.5 5.5C11.5 4.4 12.4 3.5 13.5 3.5S15.5 4.4 15.5 5.5v6.5l1 .58c.44-.34.98-.58 1.57-.58 1.1 0 2 .75 2.27 1.76l.73-.26c.35-.12.72-.18 1.1-.18.96 0 1.83.63 1.83 1.49V17c0 3.03-2.47 5.5-5.5 5.5h-4.27C11.64 22.5 9.5 20.36 9.5 17.78V12c0-1.1.9-2 2-2 .35 0 .68.09.96.26L11.5 9.5V5.5z"/>'
            + '</svg>';

          var $label  = $('<div class="swipe-hint-label">Peel corner to flip</div>');
          var $hand   = $('<div class="swipe-hand-demo"></div>').html(handSvg);
          $('.flipbook-viewport').append($label).append($hand);

          var loops = 0, MAX_LOOPS = 3;
          var CYCLE = 1600; /* ms — matches animation duration */

          function runLoop(){
            if(loops >= MAX_LOOPS){ teardown(); return; }
            loops++;
            $hand.removeClass('run');
            /* Force reflow to restart CSS animation */
            void $hand[0].offsetWidth;
            $hand.addClass('run');
            setTimeout(runLoop, CYCLE + 800); /* pause between loops */
          }

          function teardown(){
            $label.removeClass('show');
            setTimeout(function(){ $label.remove(); $hand.remove(); }, 400);
            localStorage.setItem(HINT_KEY, '1');
          }

          /* Start after the book settles */
          setTimeout(function(){
            $label.addClass('show');
            setTimeout(runLoop, 300);
          }, 2200);

          /* If user turns a page themselves, cancel the demo immediately */
          $('#flipbook').one('turning', function(){
            loops = MAX_LOOPS;
            teardown();
          });
        }

        }

        /* Jump to page 1 (first real spread) without animation. Wrapped in
           guardedFlip so the 'turning' gate allows this programmatic set. */
        flipBookTo(1);
        updateCounter(1);
        onFlipbookPageChanged(getSpreadPageElement(0));
        /* Safe flipbook media controller
           Restore the original first-page bootstrap if turn.js doesn't
           emit the final page-enter flow on the initial page set. */
        setTimeout(function(){
          if(curSpread !== 0) return;
          var pageOneReady = currentPlayingPage === 0 || $('#storyOverlay').children().length > 0;
          if(pageOneReady) return;
          buildOverlay(0);
          setTimeout(function(){ startSeq(0); }, 400);
          syncCurrentPageMedia(0);
        }, 120);

        /* Evaluate nav buttons for the cover once its media exists. The cover
           stays free of Back/Next and does NOT auto-advance — instead the
           Start button is revealed so the reader must click it to begin. */
        setTimeout(function(){ navRefresh(); }, 350);

        /* Click/tap left binding to go to previous page (mouse + touch + pointer) */
        $('.flipbook-viewport').off('.videoSound').on('pointerdown.videoSound mousedown.videoSound touchstart.videoSound', function(){
          armVideoSound();
        });

        /* Safety net: first user gesture ANYWHERE unlocks audio for the
           active page. Covers cases where the gesture lands outside the
           flipbook viewport (e.g. the Start button on some skins, the
           paw-print frame, or accessibility focus). Bound once via
           { once: true } so it auto-detaches after firing. */
        function _docUnlockAudio(){
          armVideoSound();
        }
        document.addEventListener('pointerdown', _docUnlockAudio, { once: true, capture: true });
        document.addEventListener('touchstart',  _docUnlockAudio, { once: true, capture: true, passive: true });
        document.addEventListener('click',       _docUnlockAudio, { once: true, capture: true });

        /* The book spine used to flip to the previous page on click. Manual
           flipping is now disabled — pages turn ONLY via the custom buttons —
           so the spine no longer navigates. It is kept solely as a first-gesture
           audio unlock. */
        $('.book-spine').off('.videoSound').on('pointerdown.videoSound mousedown.videoSound touchstart.videoSound', function(){
          armVideoSound();
        });

        /* NOTE: native corner peeling is disabled via cornerSize:0 and the
           'turning' gate above, so there is no drag/click page-fold gesture. */

      }

      /* ── Preload all videos, then show Start button ── */
      function preloadAllVideos(callback){
        var videoUrls = [];
        STORY.pages.forEach(function(p){ if(p.video) videoUrls.push(p.video); });
        var unique = videoUrls.filter(function(v,i,a){ return a.indexOf(v) === i; });
        if(unique.length === 0){ showStartButton(callback); return; }

        var loaded = 0;
        var bar = document.getElementById('loaderBar');

        unique.forEach(function(url){
          fetch(url).then(function(r){ return r.blob(); }).then(function(blob){
            var blobUrl = URL.createObjectURL(blob);
            preloadedVideos[url] = blobUrl;
            loaded++;
            if(bar) bar.style.width = Math.round((loaded/unique.length)*100) + '%';
            if(loaded === unique.length) onAllLoaded();
          }).catch(function(){
            loaded++;
            if(bar) bar.style.width = Math.round((loaded/unique.length)*100) + '%';
            if(loaded === unique.length) onAllLoaded();
          });
        });

        function onAllLoaded(){
          /* Assign blob URLs to all video elements */
          var allVids = $('.spread-video').get();
          allVids.forEach(function(vid){
            var si = parseInt(vid.getAttribute('data-spread'));
            var page = STORY.pages[si];
            if(page && page.video && preloadedVideos[page.video]){
              vid.src = preloadedVideos[page.video];
            }
          });
          $('#video-9-overlay[data-preload-src], .p81-reveal-video[data-preload-src]').each(function(){
            var originalSrc = this.getAttribute('data-preload-src');
            if(originalSrc && preloadedVideos[originalSrc]){
              this.src = preloadedVideos[originalSrc];
            }
          });

          /* Warm up all videos: play muted briefly to prime the decoder,
             then pause & reset. This eliminates first-play flicker. */
          var warmCount = 0;
          var uniqueVids = [];
          var seen = {};
          allVids.forEach(function(v){
            var key = v.getAttribute('data-spread') + '-' + v.getAttribute('data-side');
            if(!seen[key]){ seen[key] = true; uniqueVids.push(v); }
          });
          if(uniqueVids.length === 0){ showStartButton(callback); return; }

          function onWarm(){
            warmCount++;
            if(warmCount >= uniqueVids.length){
              /* All warmed up — reset and show start */
              allVids.forEach(function(v){
                clearVideoEndedState(v);
                try{ v.pause(); v.currentTime = 0; }catch(e){}
              });
              showStartButton(callback);
            }
          }

          uniqueVids.forEach(function(v){
            setVideoMutedState(v, true);
            var played = false;
            function done(){
              if(played) return; played = true;
              clearVideoEndedState(v);
              try{ v.pause(); v.currentTime = 0; }catch(e){}
              onWarm();
            }
            /* Play and wait for at least one frame to render, then stop */
            v.addEventListener('playing', function warmHandler(){
              v.removeEventListener('playing', warmHandler);
              setTimeout(done, 150);
            });
            v.play().catch(function(){ done(); });
            /* Fallback timeout in case 'playing' never fires */
            setTimeout(done, 2000);
          });
        }
      }

      var _appCallback = null;
      /* Loading finished. There is NO separate start screen: complete the
         loading bar, then fade the preloader out to reveal the live book —
         which shows the identical thumbnail. The image Start button then
         appears on that thumbnail (handled by the book's nav logic), and the
         reader clicks it to begin. Audio is unlocked by that Start click. */
      function showStartButton(callback){
        _appCallback = callback;
        var bar = document.getElementById('loaderBar');
        if(bar) bar.style.width = '100%';
        var pl = document.getElementById('preloader');
        if(pl){
          /* brief beat so the filled bar is visible, then dissolve */
          setTimeout(function(){
            pl.classList.add('hide');
            setTimeout(function(){ pl.style.display = 'none'; }, 600);
          }, 250);
        }
        if(_appCallback) setTimeout(_appCallback, 120);
      }

      $(document).keydown(function(e){
        startMusic();
        /* Route arrow keys through the SAME visibility-gated navigation as the
           buttons, so they only flip when a button is actually shown (not during
           a video, not past the first/last page). */
        if(e.key === 'ArrowRight'){
          videoSoundEnabled = true;
          navGoNext();
        }
        if(e.key === 'ArrowLeft'){
          videoSoundEnabled = true;
          navGoPrev();
        }
      });

      initMusic();
      $(document).ready(function(){
        preloadAllVideos(loadApp);
      });
    </script>
  </body>
</html>
